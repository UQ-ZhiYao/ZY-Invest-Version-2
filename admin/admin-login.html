<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Console — ZY-Invest</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0D2A52">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ZY Admin">
<meta name="application-name" content="ZY Admin">
<link rel="icon" type="image/png" href="../assets/img/favicon.png">
<link rel="apple-touch-icon" href="../assets/img/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1565C0; --blue-dark:#0D47A1; --green:#2E7D32; --red:#DC2626;
  --ink:#0F172A; --fg-2:#374151; --fg-3:#64748B; --border:#E2E8F0;
  --font-body:'DM Sans',system-ui,sans-serif; --font-mono:'DM Mono',monospace;
  --radius-md:10px; --radius-lg:16px; --radius-xl:24px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{font-family:var(--font-body);color:var(--ink);background:#0B1220;-webkit-font-smoothing:antialiased;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
.bg{position:fixed;inset:0;z-index:0;background:linear-gradient(160deg,#0B1220 0%,#0D2A52 55%,#0B1220 100%);}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;}
.orb.a{width:480px;height:480px;background:radial-gradient(circle,rgba(21,101,192,.55),transparent 70%);top:-140px;right:-80px;animation:drift1 14s ease-in-out infinite;}
.orb.b{width:420px;height:420px;background:radial-gradient(circle,rgba(46,125,50,.35),transparent 70%);bottom:-160px;left:-100px;animation:drift2 17s ease-in-out infinite;}
.grid-lines{position:absolute;inset:0;opacity:.06;background-image:linear-gradient(rgba(255,255,255,.6) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.6) 1px,transparent 1px);background-size:54px 54px;}
@keyframes drift1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-46px,40px) scale(1.1);}}
@keyframes drift2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(40px,-36px) scale(1.08);}}
.card{position:relative;z-index:2;width:100%;max-width:440px;background:#fff;border-radius:var(--radius-xl);
  box-shadow:0 30px 80px rgba(0,0,0,.45);overflow:hidden;animation:rise .5s ease;}
@keyframes rise{from{transform:translateY(16px);}to{transform:none;}}
.card-top{background:linear-gradient(160deg,#0D47A1,#1565C0);padding:30px 34px 26px;color:#fff;position:relative;overflow:hidden;}
.card-top::after{content:'';position:absolute;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.16),transparent 70%);top:-90px;right:-60px;}
.brand{display:flex;align-items:center;gap:11px;position:relative;}
.brand img{height:44px;}
.brand b{font-size:1.05rem;font-weight:600;letter-spacing:-0.01em;}
.brand .sub{font-size:0.7rem;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,.7);}
.card-top h1{margin:18px 0 5px;font-size:1.5rem;font-weight:600;letter-spacing:-0.02em;position:relative;}
.card-top p{margin:0;font-size:0.86rem;color:rgba(255,255,255,.8);position:relative;line-height:1.5;}
.lock-pill{position:absolute;top:30px;right:34px;z-index:3;display:inline-flex;align-items:center;gap:6px;font-size:0.68rem;font-weight:600;
  letter-spacing:0.08em;text-transform:uppercase;color:#fff;background:rgba(255,255,255,.16);padding:6px 11px;border-radius:999px;}
.card-body{padding:28px 34px 32px;}
.note{display:none;font-size:0.83rem;padding:10px 13px;border-radius:var(--radius-md);margin-bottom:16px;}
.note.error{display:block;background:#FEF2F2;color:var(--red);border:1px solid #FECACA;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-3);margin-bottom:7px;}
.field input{width:100%;font:inherit;font-size:0.94rem;color:var(--ink);background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;transition:border .2s, box-shadow .2s;}
.field input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,101,192,.10);}
.pw-wrap{position:relative;}
.pw-toggle{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:0.8rem;font-weight:600;color:var(--blue);cursor:pointer;user-select:none;}
.submit{width:100%;font:inherit;font-size:0.95rem;font-weight:600;color:#fff;background:var(--blue);border:none;border-radius:var(--radius-md);
  padding:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 2px 8px rgba(21,101,192,.3);
  transition:background .2s, transform .1s, box-shadow .2s;margin-top:4px;}
.submit:hover{background:var(--blue-dark);transform:translateY(-1px);box-shadow:0 4px 14px rgba(21,101,192,.4);}
.submit:disabled{opacity:.7;cursor:default;transform:none;}
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;display:none;animation:rot .7s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}
.back{margin-top:16px;text-align:center;font-size:0.82rem;}
.back a{color:var(--fg-3);text-decoration:none;}
.back a:hover{color:var(--blue);}
.install-row{margin-top:18px;display:none;}
.install-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:9px;font-family:var(--font-body);font-size:0.9rem;font-weight:600;color:var(--blue);background:var(--blue-bg,#E8F0FB);border:1.5px solid var(--blue);border-radius:var(--radius-md,10px);padding:11px;cursor:pointer;transition:background .2s;}
.install-btn:hover{background:#dbe8fa;}
.install-btn img{width:20px;height:20px;border-radius:4px;}
.install-hint{margin-top:9px;font-size:0.72rem;color:var(--fg-3);text-align:center;line-height:1.5;}
#prog{position:fixed;inset:0;z-index:50;background:linear-gradient(160deg,#0B1220,#0D2A52);display:none;align-items:center;justify-content:center;flex-direction:column;gap:22px;}
#prog.show{display:flex;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.prog-mark{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center;}
.prog-mark img{height:42px;}
.prog-ring{position:absolute;inset:0;}
.prog-ring circle{fill:none;stroke-width:2.5;}
.prog-ring .trk{stroke:rgba(255,255,255,.14);}
.prog-ring .prg{stroke:#fff;stroke-linecap:round;stroke-dasharray:339.3;stroke-dashoffset:339.3;transition:stroke-dashoffset .1s linear;transform:rotate(-90deg);transform-origin:center;}
.prog-txt{color:#fff;font-size:0.82rem;letter-spacing:0.14em;text-transform:uppercase;}
.prog-pct{color:rgba(255,255,255,.6);font-family:var(--font-mono);font-size:0.8rem;}
</style>
</head>
<body>
<div class="bg"><div class="orb a"></div><div class="orb b"></div><div class="grid-lines"></div></div>

<div class="card">
  <div class="card-top">
    <span class="lock-pill">🔒 Restricted</span>
    <div class="brand">
      <img src="../assets/img/logo.png" alt="ZY-Invest">
      <span><b style="display:block;">ZY-Invest</b><span class="sub">Admin Console</span></span>
    </div>
    <h1>Fund Management</h1>
    <p>Authorised personnel only. Manage investor principal, distributions, and daily NTA.</p>
  </div>
  <div class="card-body">
    <div class="note" id="note"></div>
    <form id="adminForm" autocomplete="on">
      <div class="field">
        <label for="email">Admin Email</label>
        <input type="email" id="email" placeholder="admin@zy-invest.com" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
          <span class="pw-toggle" id="pwToggle">Show</span>
        </div>
      </div>
      <button type="submit" class="submit" id="submitBtn"><span id="btnText">Sign In to Console</span><span class="spin" id="spin"></span></button>
    </form>
    <div class="back"><a href="../login.html">← Member login</a></div>
    <div class="install-row" id="installRow">
      <button class="install-btn" id="installBtn"><img src="../assets/img/icon-192.png" alt=""> Install Admin App</button>
      <div class="install-hint" id="installHint"></div>
    </div>
  </div>
</div>

<div id="prog">
  <div class="prog-mark">
    <svg class="prog-ring" viewBox="0 0 120 120"><circle class="trk" cx="60" cy="60" r="54"/><circle class="prg" id="progRing" cx="60" cy="60" r="54"/></svg>
    <img src="../assets/img/logo.png" alt="ZY-Invest">
  </div>
  <div class="prog-txt">Entering Admin Console</div>
  <div class="prog-pct" id="progPct">0%</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-auth.js"></script>
<script>
(function(){
  var pw=document.getElementById('password'), tog=document.getElementById('pwToggle');
  tog.addEventListener('click',function(){ if(pw.type==='password'){pw.type='text';tog.textContent='Hide';}else{pw.type='password';tog.textContent='Show';} });

  var form=document.getElementById('adminForm'), btn=document.getElementById('submitBtn'),
      btnText=document.getElementById('btnText'), spin=document.getElementById('spin'), note=document.getElementById('note');

  function err(m){ note.textContent=m; note.className='note error'; }
  function clearErr(){ note.className='note'; }

  function runProgress(done){
    var prog=document.getElementById('prog'), ring=document.getElementById('progRing'), pct=document.getElementById('progPct');
    prog.classList.add('show'); var C=339.3, p=0;
    var t=setInterval(function(){
      p+=Math.random()*16+8; if(p>=100){p=100;clearInterval(t);setTimeout(done,260);}
      ring.style.strokeDashoffset=C*(1-p/100); pct.textContent=Math.round(p)+'%';
    },90);
  }

  /* ── NO auto-redirect on this page ─────────────────────────
     Auto-redirect was causing infinite loops after logout.
     Admin must always manually sign in.                       */

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    clearErr();
    var email=document.getElementById('email').value.trim();
    var password=pw.value;
    btn.disabled=true; btnText.textContent='Signing in…'; spin.style.display='block';
    try{
      if(!sb) throw new Error('Auth service not configured.');

      /* Always sign out any existing session first to ensure clean state */
      try{ await sb.auth.signOut(); }catch(ex){}

      var res=await sb.auth.signInWithPassword({ email:email, password:password });
      if(res.error) throw res.error;

      var pr=await sb.from('profiles').select('role,full_name,status').eq('id',res.data.user.id).single();
      if(pr.error) throw new Error('Could not verify admin role.');
      if(pr.data.role!=='admin'){ await sb.auth.signOut(); throw new Error('Access denied. This account does not have admin privileges.'); }
      if(pr.data.status==='suspended'){ await sb.auth.signOut(); throw new Error('This admin account has been suspended.'); }

      try{ localStorage.setItem('zy_admin_session', JSON.stringify({ name:pr.data.full_name||email, role:'admin', email:email, ts:Date.now() })); }catch(ex){}

      runProgress(function(){ window.location.href='admin.html'; });
    }catch(ex){
      var m=(ex&&ex.message)||'Login failed.';
      if(/invalid login/i.test(m)||/invalid credentials/i.test(m)) m='Incorrect email or password.';
      err(m);
      btn.disabled=false; btnText.textContent='Sign In to Console'; spin.style.display='none';
    }
  });

  /* ── PWA install ──────────────────────────────────────────── */
  (function(){
    if('serviceWorker' in navigator){ window.addEventListener('load',function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); }); }
    var row=document.getElementById('installRow'), ibtn=document.getElementById('installBtn'), hint=document.getElementById('installHint');
    var deferred=null;
    var standalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
    if(standalone) return;
    window.addEventListener('beforeinstallprompt',function(e){ e.preventDefault(); deferred=e; row.style.display='block'; hint.textContent=''; });
    ibtn.addEventListener('click',async function(){
      if(deferred){ deferred.prompt(); var choice=await deferred.userChoice; deferred=null; if(choice&&choice.outcome==='accepted') row.style.display='none'; else hint.textContent='Installation dismissed.'; return; }
      var ua=navigator.userAgent;
      if(/iPhone|iPad|iPod/i.test(ua)) hint.textContent='On iPhone/iPad: tap the Share button, then "Add to Home Screen".';
      else if(/Macintosh/i.test(ua)&&'ontouchend' in document) hint.textContent='Tap Share, then "Add to Home Screen".';
      else hint.textContent='Open your browser menu and choose "Install ZY Admin" / "Install app".';
    });
    window.addEventListener('appinstalled',function(){ row.style.display='none'; });
    setTimeout(function(){ if(!standalone&&row.style.display!=='block'){ row.style.display='block'; if(!deferred&&!hint.textContent){ hint.textContent='Install from your browser menu, or tap to see how.'; } } },1200);
  })();
})();
</script>
</body>
</html>
